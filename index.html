<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Winnie Tan is a writer based in Tokyo and Kuala Lumpur, author of several Lonely Planet guidebooks on Japan and Malaysia, and currently writing a collection of personal essays.">
<link rel="canonical" href="https://winnie-tan.com/">

<meta property="og:type" content="website">
<meta property="og:title" content="Winnie Tan">
<meta property="og:description" content="Writer based in Tokyo and Kuala Lumpur. Author of several Lonely Planet guidebooks on Japan and Malaysia. Currently working on a collection of personal essays.">
<meta property="og:url" content="https://winnie-tan.com/">
<meta property="og:image" content="https://winnie-tan.com/profile_square.png">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Winnie Tan">
<meta name="twitter:description" content="Writer based in Tokyo and Kuala Lumpur. Author of several Lonely Planet guidebooks on Japan and Malaysia.">
<meta name="twitter:image" content="https://winnie-tan.com/profile_square.png">

<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --text: #37352f;
    --text-secondary: #787774;
    --border: rgba(55, 53, 47, 0.09);
    --hover: #f1f1ef;
    --icon-shadow: rgba(15, 15, 15, 0.1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 64px 20px;
  }

  .page {
    width: 100%;
    max-width: 560px;
  }

  .icon {
    width: 76px;
    height: 76px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 1px 2px var(--icon-shadow);
    margin-bottom: 18px;
  }

  .icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: var(--hover);
  }

  h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0 0 10px;
    color: var(--text);
  }

  .bio {
    font-size: 16px;
    line-height: 1.55;
    color: var(--text-secondary);
    margin: 0;
    max-width: 46ch;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0 12px;
  }

  .links {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .links a {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--text);
    padding: 14px 12px;
    border-radius: 8px;
    font-size: 17px;
    font-weight: 500;
    transition: background 0.12s ease;
    cursor: pointer;
  }

  .links a:hover,
  .links a:focus-visible {
    background: var(--hover);
  }

  .links a:focus-visible {
    outline: 2px solid #2383e2;
    outline-offset: -2px;
  }

  .icon-chip {
    width: 34px;
    height: 34px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-chip svg {
    width: 19px;
    height: 19px;
  }

  .chip-instagram { background: #fce4ec; color: #c2185b; }
  .chip-substack  { background: #fff1e0; color: #e8590c; }
  .chip-portfolio { background: #e3f2fd; color: #1565c0; }
  .chip-boyfriend { background: #fdeaf0; color: #d6336c; }
  .chip-email     { background: #e6f4ea; color: #2e7d32; }

  .link-text {
    flex: 1;
  }

  .chevron {
    color: var(--text-secondary);
    opacity: 0;
    transition: opacity 0.12s ease;
    font-size: 14px;
  }

  .links a:hover .chevron {
    opacity: 1;
  }
</style>
</head>
<body>

  <main class="page">
    <div class="icon">
      <img src="profile_square.png" alt="Winnie">
    </div>

    <h1>Winnie Tan</h1>
    <p class="bio">Writer based in Tokyo and Kuala Lumpur. Author of several Lonely Planet guidebooks on Japan and Malaysia. Currently working on a collection of personal essays.</p>

    <hr class="divider">

    <ul class="links">
      <li>
        <a href="https://www.instagram.com/weeniemon" target="_blank" rel="noopener">
          <span class="icon-chip chip-instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>
              <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle>
            </svg>
          </span>
          <span class="link-text">Instagram</span>
          <span class="chevron">&rarr;</span>
        </a>
      </li>
      <li>
        <a href="https://substack.com/@winnietan" target="_blank" rel="noopener">
          <span class="icon-chip chip-substack">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 4h14v3H5z"></path>
              <path d="M5 9h14v3H5z"></path>
              <path d="M5 14h14v7l-7-4-7 4z"></path>
            </svg>
          </span>
          <span class="link-text">Substack</span>
          <span class="chevron">&rarr;</span>
        </a>
      </li>
      <li>
        <a href="#" target="_blank" rel="noopener">
          <span class="icon-chip chip-portfolio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <ellipse cx="12" cy="12" rx="4" ry="9"></ellipse>
              <path d="M3 12h18"></path>
            </svg>
          </span>
          <span class="link-text">Portfolio</span>
          <span class="chevron">&rarr;</span>
        </a>
      </li>
      <li>
        <a href="mailto:yijun.tan@asagi.waseda.jp" id="email-link" data-email="yijun.tan@asagi.waseda.jp">
          <span class="icon-chip chip-email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M3 6.5l9 6.5 9-6.5"></path>
            </svg>
          </span>
          <span class="link-text">Email</span>
          <span class="chevron">&rarr;</span>
        </a>
      </li>
      <li>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScVzBipXnZ5VpKNCrIw6Eg5PngvAfjA3ZtXw-Set1RDNruofQ/viewform?usp=header" target="_blank" rel="noopener">
          <span class="icon-chip chip-boyfriend">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="3.5"></circle>
              <path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"></path>
            </svg>
          </span>
          <span class="link-text">Boyfriend Application Form 彼氏応募フォーム</span>
          <span class="chevron">&rarr;</span>
        </a>
      </li>
    </ul>
  </main>

  <script>
    (function () {
      var emailLink = document.getElementById('email-link');
      if (!emailLink) return;
      var textEl = emailLink.querySelector('.link-text');
      var originalText = textEl.textContent;
      var resetTimer = null;

      emailLink.addEventListener('click', function (e) {
        e.preventDefault();
        var email = emailLink.getAttribute('data-email');

        function showCopied() {
          textEl.textContent = 'Copied!';
          clearTimeout(resetTimer);
          resetTimer = setTimeout(function () {
            textEl.textContent = originalText;
          }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(email).then(showCopied).catch(function () {
            fallbackCopy(email);
            showCopied();
          });
        } else {
          fallbackCopy(email);
          showCopied();
        }
      });

      function fallbackCopy(text) {
        var temp = document.createElement('textarea');
        temp.value = text;
        temp.style.position = 'fixed';
        temp.style.opacity = '0';
        document.body.appendChild(temp);
        temp.focus();
        temp.select();
        try { document.execCommand('copy'); } catch (err) {}
        document.body.removeChild(temp);
      }
    })();
  </script>

</body>
</html>
